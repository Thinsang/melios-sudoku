    <rect x="0" y="0" width="3.4" height="3.4" rx="0.6"/>
    <rect x="4.25" y="0" width="3.4" height="3.4" rx="0.6" opacity="0.15"/>
    <rect x="8.5" y="0" width="3.4" height="3.4" rx="0.6" opacity="0.4"/>
