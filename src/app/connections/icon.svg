<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Connections favicon. 2x2 grid of the four group-difficulty colors
       (yellow / green / blue / purple) on transparent. Each square has a
       thin matching darker border so the lighter colors (especially yellow)
       stay readable on light browser tabs. -->
  <rect x="5" y="5" width="10" height="10" rx="1.5" fill="#f5d97a" stroke="#d4b956" stroke-width="0.5"/>
  <rect x="17" y="5" width="10" height="10" rx="1.5" fill="#a0c878" stroke="#7fa658" stroke-width="0.5"/>
  <rect x="5" y="17" width="10" height="10" rx="1.5" fill="#85c0f9" stroke="#5a9bd9" stroke-width="0.5"/>
  <rect x="17" y="17" width="10" height="10" rx="1.5" fill="#c4a8ea" stroke="#9b80c4" stroke-width="0.5"/>
</svg>
