    <rect x="6" y="15.25" width="6" height="2.5" rx="0.4"/>
    <rect x="7.75" y="13.5" width="2.5" height="6" rx="0.4"/>
  </g>
  <!-- Four action buttons in a diamond -->
  <g fill="#faf6ee">
    <circle cx="22" cy="13.5" r="1.3"/>
    <circle cx="25.5" cy="16.5" r="1.3"/>
    <circle cx="22" cy="19.5" r="1.3"/>
    <circle cx="18.5" cy="16.5" r="1.3"/>
  </g>
</svg>
