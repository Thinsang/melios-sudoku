  <rect x="3" y="11" width="8" height="10" rx="1" fill="#6aaa64"/>
  <rect x="12" y="11" width="8" height="10" rx="1" fill="#c9b458"/>
  <rect x="21" y="11" width="8" height="10" rx="1" fill="#787c7e"/>
</svg>
